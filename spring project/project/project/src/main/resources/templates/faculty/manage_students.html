<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Manage Students - Faculty</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>.sidebar { min-height: 100vh; border-right: 1px solid #dee2e6; }</style>
</head>
<body class="bg-light">

<header class="navbar navbar-dark bg-success shadow sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" th:href="@{/faculty/dashboard}">
      <i class="bi bi-person-badge-fill me-2"></i>Faculty Panel
    </a>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn btn-outline-light btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </form>
  </div>
</header>

<div class="container-fluid">
  <div class="row">

    <nav class="col-md-2 d-none d-md-block bg-white sidebar py-4 px-3">
      <ul class="nav flex-column gap-1">
        <li><a class="nav-link text-dark" th:href="@{/faculty/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
        <li><a class="nav-link active text-success fw-bold" th:href="@{/faculty/students}"><i class="bi bi-people-fill me-2"></i>Students</a></li>
        <li><a class="nav-link text-dark" th:href="@{/faculty/attendance}"><i class="bi bi-calendar-check me-2"></i>Attendance</a></li>
        <li><a class="nav-link text-dark" th:href="@{/faculty/scores}"><i class="bi bi-clipboard-data me-2"></i>Exam Scores</a></li>
        <li><a class="nav-link text-dark" th:href="@{/faculty/fees}"><i class="bi bi-cash-stack me-2"></i>Fee Status</a></li>
      </ul>
    </nav>

    <main class="col-md-10 px-4 py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h4 class="fw-bold text-secondary mb-0">Manage Students</h4>
          <p class="text-muted small mb-0">Showing students from your assigned classes</p>
        </div>
        <button class="btn btn-success" type="button"
                data-bs-toggle="collapse" data-bs-target="#addStudentForm">
          <i class="bi bi-plus-circle me-1"></i>Add Student
        </button>
      </div>

      <!-- Alerts -->
      <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- Add Student Form -->
      <div class="collapse mb-4" id="addStudentForm">
        <div class="card card-body shadow-sm">
          <h6 class="fw-bold mb-3">New Student Details</h6>
          <form th:action="@{/faculty/students/add}" method="post">
            <div class="row g-3">
              <div class="col-md-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" name="name" required>
              </div>
              <div class="col-md-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" required>
              </div>
              <div class="col-md-2">
                <label class="form-label">Phone</label>
                <input type="text" class="form-control" name="phone">
              </div>
              <div class="col-md-1">
                <label class="form-label">Class</label>
                <!-- Pre-fill with faculty's classes only -->
                <select name="classNumber" class="form-control">

<option value="">Select Class</option>

<option th:each="course : ${myCourses}"
        th:value="${course.classNumber}"
        th:text="'Class ' + ${course.classNumber}">
</option>

</select>
              </div>
              <div class="col-md-1">
                <label class="form-label">Section</label>
                <input type="text" class="form-control" name="section" value="A" required>
              </div>
              <div class="col-md-2">
                <label class="form-label">Roll Number</label>
                <input type="text" class="form-control" name="rollNumber" required>
              </div>
              <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100">
                  <i class="bi bi-check-circle me-1"></i>Add
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Class Filter -->
      <div class="card shadow-sm mb-3">
        <div class="card-body py-2">
          <form th:action="@{/faculty/students}" method="get" class="row g-2 align-items-end">
            <div class="col-auto">
              <label class="form-label mb-0 small fw-bold">Filter by Class:</label>
            </div>
            <div class="col-auto">
              <select class="form-select form-select-sm" name="classNumber">
                <option value="">All my classes</option>
                <option th:each="course : ${myCourses}"
                        th:value="${course.classNumber}"
                        th:text="'Class ' + ${course.classNumber}"
                        th:selected="${course.classNumber == selectedClass}">
                </option>
              </select>
            </div>
            <div class="col-auto">
              <button type="submit" class="btn btn-sm btn-success">
                <i class="bi bi-funnel me-1"></i>Filter
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Students Table -->
      <div class="card shadow-sm">
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-dark">
              <tr>
                <th>Roll No.</th>
                <th>Name</th>
                <th>Class</th>
                <th>Section</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="student : ${students}">
                <td th:text="${student.rollNumber}"></td>
                <td th:text="${student.user.name}"></td>
                <td th:text="${student.classNumber}"></td>
                <td th:text="${student.section}"></td>
                <td th:text="${student.phone}"></td>
                <td th:text="${student.user.email}"></td>
                <td>
                  <a th:href="@{/faculty/students/edit/{id}(id=${student.id})}"
                     class="btn btn-sm btn-warning me-1">
                    <i class="bi bi-pencil"></i>
                  </a>
                  <a th:href="@{/faculty/students/delete/{id}(id=${student.id})}"
                     class="btn btn-sm btn-danger"
                     onclick="return confirm('Delete this student?')">
                    <i class="bi bi-trash"></i>
                  </a>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(students)}">
                <td colspan="7" class="text-center text-muted py-4">
                  <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                  No students found.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
